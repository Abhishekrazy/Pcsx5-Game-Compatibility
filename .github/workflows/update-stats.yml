name: Update Compatibility Stats

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:      # Manual trigger
  issues:
    types: [opened, closed, labeled, unlabeled, reopened]

permissions:
  contents: write
  issues: read

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch issue statistics
        id: stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python << 'EOF'
          import os
          import requests
          import json

          repo = os.environ['REPO']
          token = os.environ['GITHUB_TOKEN']
          headers = {'Authorization': f'token {token}', 'Accept': 'application/vnd.github+json'}

          labels = {
              'status-playable': 'Playable',
              'status-ingame': 'In-Game',
              'status-menus': 'Menus',
              'status-boots': 'Boots',
              'status-nothing': 'Nothing'
          }

          stats = {}
          total = 0

          for label, name in labels.items():
              url = f'https://api.github.com/repos/{repo}/issues'
              params = {'labels': label, 'state': 'all', 'per_page': 1}
              resp = requests.get(url, headers=headers, params=params)
              resp.raise_for_status()
              # Get total count from Link header
              link = resp.headers.get('Link', '')
              if 'rel="last"' in link:
                  import re
                  match = re.search(r'page=(\d+)>; rel="last"', link)
                  if match:
                      count = int(match.group(1)) * 100  # approximation
                  else:
                      count = len(resp.json())
              else:
                  count = len(resp.json())
              
              # More accurate: use search API
              search_url = f'https://api.github.com/search/issues'
              search_params = {'q': f'repo:{repo} label:"{label}"', 'per_page': 1}
              search_resp = requests.get(search_url, headers=headers, params=search_params)
              search_resp.raise_for_status()
              count = search_resp.json()['total_count']
              
              stats[name] = count
              total += count
              print(f'{name}: {count}')

          print(f'Total: {total}')

          # Output for next step
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'stats={json.dumps(stats)}\n')
              f.write(f'total={total}\n')

      - name: Update README with stats
        if: steps.stats.outputs.stats != ''
        run: |
          python << 'EOF'
          import os
          import json
          import re
          from datetime import datetime

          stats = json.loads(os.environ['STATS_JSON'])
          total = int(os.environ['TOTAL'])

          with open('COMPATIBILITY_README.md', 'r') as f:
              content = f.read()

          # Update the stats table
          table_lines = []
          for status, count in stats.items():
              pct = (count / total * 100) if total > 0 else 0
              color_map = {
                  'Playable': '0e8a16',
                  'In-Game': 'fbca04',
                  'Menus': 'f9d0c4',
                  'Boots': 'd4c5f9',
                  'Nothing': 'ededed'
              }
              color = color_map.get(status, 'ededed')
              badge = f'![{status}](https://img.shields.io/badge/{status.replace(" ", "%20")}-{count}-{color}?style=flat-square)'
              table_lines.append(f'| {badge} | {count} | {pct:.1f}% |')

          new_table = '\n'.join(table_lines)
          new_table += f'\n| **Total** | **{total}** | **100%** |'

          # Replace the table in README
          pattern = r'(\| Status \| Count \| Percentage \|\n\|[-|]+\|\n)(.*?)(\n\| \*\*Total\*\*)'
          replacement = r'\1' + new_table + r'\3'
          content = re.sub(pattern, replacement, content, flags=re.DOTALL)

          # Update last updated date
          content = re.sub(
              r'> 📈 \*Last updated: .*? \*',
              f'> 📈 *Last updated: {datetime.utcnow().strftime("%Y-%m-%d")} • [Refresh stats](https://github.com/{os.environ["REPO"]}/actions/workflows/update-stats.yml)*',
              content
          )

          with open('COMPATIBILITY_README.md', 'w') as f:
              f.write(content)

          print('README updated successfully')
        env:
          STATS_JSON: ${{ steps.stats.outputs.stats }}
          TOTAL: ${{ steps.stats.outputs.total }}
          REPO: ${{ github.repository }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMPATIBILITY_README.md
          git diff --staged --quiet || git commit -m "chore: update compatibility stats [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
